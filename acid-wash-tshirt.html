<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KHEM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}
body{background:#f5f5f5;color:#111;}

.container{max-width:1200px;margin:auto;padding:0 20px;}

.header{background:#fff;border-bottom:1px solid #ddd;}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:20px 0;}
.nav a{margin:0 15px;text-decoration:none;color:#333;font-weight:500;}

.hero{background:#f7f7f7;padding:60px 0;margin-bottom:60px;}
.hero-content{display:flex;align-items:center;justify-content:space-between;gap:40px;}
.hero-text h1{font-size:44px;margin-bottom:10px;}
.hero-text p{font-size:18px;margin-bottom:20px;color:#555;}
.hero img{max-width:420px;width:100%;}

.btn{padding:14px 24px;background:#111;color:#fff;border:none;cursor:pointer;font-size:15px;}

.product{display:grid;grid-template-columns:2fr 1fr;gap:50px;margin-bottom:80px;}

.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
.gallery img{width:100%;background:#fff;padding:10px;}

.info h2{font-size:28px;margin-bottom:5px;}
.sku{color:#666;margin-bottom:20px;}

.sizes{display:flex;gap:10px;margin-bottom:20px;}
.size{padding:10px 14px;border:1px solid #ccc;cursor:pointer;}
.size.active{background:#111;color:#fff;}

.price{font-size:26px;margin-bottom:20px;}

.actions{display:flex;gap:15px;margin-bottom:20px;}

.products{padding:60px 40px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:25px;}
.card{text-decoration:none;color:inherit;display:block;}
.card img{width:100%;background:#f5f5f5;}

.footer{background:#111;color:#fff;padding:40px 0;margin-top:40px;}

@media(max-width:900px){
.hero-content{flex-direction:column;text-align:center;}
.product{grid-template-columns:1fr;}
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">KHEM</div>

    <nav class="nav">
      <a href="catalog.html">Catalog</a>
      <a href="brand.html">Brands</a>
    </nav>

    <div>
      <a href="cart.html">🛒 <span id="cart-count">0</span></a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container hero-content">
    <div class="hero-text">
      <h1>Acid Wash T-Shirt</h1>
      <p>Legendary cushioning. Timeless design.</p>
      <button class="btn" onclick="window.location.href='brand.html'">
        Shop now →
      </button>
    </div>
    <img src="https://i.pinimg.com/1200x/c1/6c/95/c16c95af58c444c1d863671073509e62.jpg">
  </div>
</section>

<main class="container">

<section class="product">
  <div class="gallery">
    <img src="https://i.pinimg.com/1200x/69/15/c6/6915c693435e97652ddc7d990439e080.jpg">
    <img src="https://i.pinimg.com/736x/6b/5c/3e/6b5c3eb5b0abf36ba4878ee552caae91.jpg">
    <img src="https://i.pinimg.com/1200x/03/cb/ad/03cbad62a5f6f044ac77c0dfa6fa18b8.jpg">
    <img src="https://i.pinimg.com/1200x/36/1d/ce/361dcee11fa765a1a9150038d0c928dd.jpg">
  </div>

  <div class="info">
    <h2>Acid Wash T-Shirt</h2>
    <p class="sku">Acid Wash</p>

    <div class="sizes">
      <button class="size">S</button>
      <button class="size">M</button>
      <button class="size active">L</button>
      <button class="size">XL</button>
      <button class="size">XXL</button>
    </div>

    <div class="price">200 CEDIS</div>

    <div class="actions">
      <button class="btn add-to-cart">Add to cart</button>
      <button class="btn checkout">Checkout</button>
    </div>
  </div>
</section>

<section class="products">
  <h2>SHOP THE LEGACY CAPSULE</h2>

  <div class="grid">
    <a href="black-tshirt.html" class="card">
      <img src="https://i.pinimg.com/1200x/94/e0/21/94e021c9580b8610a0aafc3eccbed4c2.jpg">
      <p>Black t-shirt</p>
    </a>

    <a href="white-tshirt.html" class="card">
      <img src="https://i.pinimg.com/1200x/63/68/cb/6368cb71583b56ddbc9ee67c83fab4dd.jpg">
      <p>White t-shirt</p>
    </a>

    <a href="acid-wash-tshirt.html" class="card">
      <img src="https://i.pinimg.com/1200x/28/4c/83/284c836256c6f56c5ef635aa99bf5181.jpg">
      <p>Acid wash t-shirt</p>
    </a>

    <a href="chocolate-tshirt.html" class="card">
      <img src="https://i.pinimg.com/736x/aa/42/28/aa4228a6e1fc12db6a76f83a59e8f89c.jpg">
      <p>Chocolate t-shirt</p>
    </a>
  </div>
</section>

</main>

<footer class="footer">
  <div class="container">
    © KHEM STREETWEAR
  </div>
</footer>

<script>
// CART CORE
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  let cart = getCart();
  let total = cart.reduce((sum,i)=>sum+i.qty,0);
  document.getElementById("cart-count").textContent = total;
}
updateCartCount();

// SIZE SELECT
document.querySelectorAll('.size').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.size').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
});

// ADD TO CART
const addBtn = document.querySelector('.add-to-cart');

if(addBtn){
addBtn.onclick = ()=>{

  let size = document.querySelector('.size.active');
  if(!size) return alert("Select size");

  let cart = getCart();

  let product = {
    id: Date.now(),
    name:"Acid Wash T-Shirt",
    size:size.textContent,
    price:200,
    image:document.querySelector(".gallery img").src,
    qty:1
  };

  let existing = cart.find(i=>i.name===product.name && i.size===product.size);

  if(existing){existing.qty++;}
  else{cart.push(product);}

  saveCart(cart);

  alert("Added to cart 🛒");
};
}

// CHECKOUT
document.querySelector('.checkout').onclick = ()=>{
  window.location.href="checkout.html";
};
</script>

</body>
</html>
