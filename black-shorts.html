<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KHEM</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: #f5f5f5;
  color: #111;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}

/* HEADER */
.header {
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
}
.nav a {
  margin: 0 15px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

/* HERO */
.hero {
  background: #f7f7f7;
  padding: 60px 0;
  margin-bottom: 60px;
}
.hero-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
}
.hero-text h1 {
  font-size: 44px;
}
.hero-text p {
  font-size: 18px;
  color: #555;
  margin: 10px 0 20px;
}
.hero img {
  max-width: 420px;
  width: 100%;
}

.btn {
  padding: 14px 24px;
  background: #111;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* PRODUCT */
.product {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 50px;
  margin-bottom: 80px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}
.gallery img {
  width: 100%;
  background: #fff;
  padding: 10px;
  cursor: pointer;
}

.info h2 {
  font-size: 28px;
}
.sku {
  color: #666;
  margin-bottom: 20px;
}

.sizes {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.size {
  padding: 10px 14px;
  border: 1px solid #ccc;
  background: none;
  cursor: pointer;
}
.size.active {
  background: #111;
  color: #fff;
}

.price {
  font-size: 26px;
  margin-bottom: 20px;
}

.actions {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.description {
  color: #555;
}

/* CTA */
.cta {
  background: linear-gradient(120deg, #ddd, #f9f9f9);
  padding: 60px 0;
}
.cta-box {
  max-width: 400px;
  margin-left: 10%;
}
.cta-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}

/* FOOTER */
.footer {
  background: #111;
  color: #fff;
  padding: 40px 0;
}
.footer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.footer a {
  color: #aaa;
  text-decoration: none;
  display: block;
  margin-bottom: 8px;
}

/* MODAL */
#imageModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}
#modalImg {
  max-width: 90%;
  max-height: 90%;
}
#closeModal {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width: 900px) {
  .hero-content {
    flex-direction: column;
    text-align: center;
  }
  .product {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">Khem</div>
    <nav class="nav">
      <a href="catalog.html">Catalog</a>
      <a href="brand.html">Brands</a>
    </nav>
    <div class="icons">
      <a href="cart.html">🛒 <span id="cart-count">0</span></a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container hero-content">
    <div class="hero-text">
      <h1>Black Shorts</h1>
      <p>Clean fit. Everyday comfort.</p>
      <button class="btn">Shop now →</button>
    </div>
    <img src="https://cdn-images.farfetch-contents.com/29/62/42/33/29624233_58710535_1000.jpg">
  </div>
</section>

<main class="container">

<section class="product">
  <div class="gallery">
    <img src="https://cdn-images.farfetch-contents.com/29/62/42/33/29624233_58710539_1000.jpg">
    <img src="https://cdn-images.farfetch-contents.com/29/62/42/33/29624233_58710526_1000.jpg">
    <img src="https://cdn-images.farfetch-contents.com/29/62/42/33/29624233_58710521_1000.jpg">
    <img src="https://cdn-images.farfetch-contents.com/29/62/42/33/29624233_58710506_1000.jpg">
  </div>

  <div class="info">
    <h2>Black Shorts</h2>
    <p class="sku">Black</p>

    <div class="sizes">
      <button class="size">30</button>
      <button class="size">31</button>
      <button class="size active">32</button>
      <button class="size">33</button>
      <button class="size">34</button>
      <button class="size">36</button>
      <button class="size">38</button>
    </div>

    <div class="price">200 CEDIS</div>

    <div class="actions">
      <button class="btn">Add to cart</button>
      <button class="btn checkout">Checkout</button>
    </div>

    <p class="description">
      Premium breathable shorts designed for comfort and durability.
    </p>
  </div>
</section>

</main>

<!-- CTA -->
<section class="cta">
  <div class="cta-box">
    <h3>Have questions?</h3>
    <input placeholder="Name">
    <input placeholder="Phone number">
    <button class="btn">Submit request →</button>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-grid">
    <div>
      <strong>LOGO</strong>
      <p>© khem group</p>
    </div>
    <div>
      <a href="catalog.html">Catalog</a>
      <a href="brand.html">Brands</a>
      <a href="sales.html">Sales</a>
    </div>
    <div>
      <a href="contact.html">Contacts</a>
    </div>
  </div>
</footer>

<!-- MODAL -->
<div id="imageModal">
  <span id="closeModal">&times;</span>
  <img id="modalImg">
</div>

<script>
// CART
function getCart() {
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const cart = getCart();
  const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById("cart-count").textContent = totalQty;
}
updateCartCount();

// SIZE
document.querySelectorAll('.size').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ADD TO CART
document.querySelector('.actions .btn').addEventListener('click', () => {
  const size = document.querySelector('.size.active').textContent;

  const cart = getCart();

  const product = {
    id: "black-shorts",
    name: "Black Shorts",
    size: size,
    price: 200,
    image: document.querySelector(".gallery img").src,
    qty: 1
  };

  const existing = cart.find(i => i.id === product.id && i.size === size);

  if (existing) existing.qty++;
  else cart.push(product);

  saveCart(cart);
  alert("Added to cart");
});

// CHECKOUT
document.querySelector('.checkout').onclick = () => {
  window.location.href = "checkout.html";
};

// MODAL
const images = document.querySelectorAll(".gallery img");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

images.forEach(img => {
  img.onclick = () => {
    modal.style.display = "flex";
    modalImg.src = img.src;
  };
});

document.getElementById("closeModal").onclick = () => {
  modal.style.display = "none";
};

modal.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};
</script>

</body>
</html>
