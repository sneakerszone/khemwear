<style>
*{

body{
  background:#f5f5f5;

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:#fff;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{font-weight:bold;letter-spacing:3px;}

nav ul{display:flex;gap:25px;list-style:none;}
nav a{text-decoration:none;color:#111;font-size:14px;}

.hero{
  height:70vh;
  display:flex;
  align-items:center;
  padding:60px;
  color:#fff;
  background:url("https://i.pinimg.com/1200x/05/87/ce/0587ce2eefa26d62edb0db0bb4ea2a8b.jpg") center/cover;
}

.hero h1{font-size:48px;}
.hero p{margin:15px 0;}

.hero button{
  padding:12px 20px;
  border:none;
  background:#fff;
  cursor:pointer;
  border-radius:6px;
}

.filter-bar{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:30px 0;
}

.filter-bar button{
  padding:10px 18px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  padding:50px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.price{margin-top:6px;font-weight:bold;}

.sizes{display:flex;gap:8px;margin-top:10px;}

.size-btn{
  padding:6px 10px;
  border:1px solid #ccc;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.size-btn.active{
  background:#111;
  color:#fff;
}

.add-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#111;
  color:#fff;
  border:none;
  padding:12px;
  cursor:pointer;
  border-radius:6px;
}

.left{left:20px;}
.right{right:20px;}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:28px;
  cursor:pointer;
}

footer{
  background:#111;
  color:#fff;
  padding:40px 60px;
}

.footer-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

footer p,footer a{
  font-size:14px;
  color:#ccc;
  text-decoration:none;
  display:block;
  margin-bottom:6px;
}

.copy{text-align:center;margin-top:30px;color:#aaa;font-size:12px;}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:20px;}

const grid = document.getElementById("productGrid");

function renderProducts(list){
  grid.innerHTML="";

  list.forEach((p,i)=>{
    const card = document.createElement("div");
    card.className="card";

    const sizeHTML = (p.sizes || []).map(s => 
      `<div class="size-btn">${s}</div>`
    ).join("");

    card.innerHTML=`
      <img src="${p.image}" onclick='openViewer(${JSON.stringify(p.images)})'>
      <h3>${p.name}</h3>
      <div class="price">GHS ${p.price}</div>

      <div class="sizes">
        ${sizeHTML}
      </div>

      <button class="add-btn" data-index="${i}">Add to Cart</button>
    `;

    grid.appendChild(card);
  });

  enableSizes();
  enableCart(list);
}

function filterProducts(cat){
  if(cat==="all") renderProducts(products);
  else renderProducts(products.filter(p=>p.category===cat));
}

/* SIZE */
function enableSizes(){
  document.querySelectorAll(".card").forEach(card=>{
    const sizes = card.querySelectorAll(".size-btn");

    sizes.forEach(btn=>{
      btn.onclick=()=>{
        sizes.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
      };
    });
  });
}

/* CART */
function enableCart(list){
  document.querySelectorAll(".add-btn").forEach(btn=>{
    btn.onclick=()=>{
      const card = btn.closest(".card");
      const product = list[btn.dataset.index];

      const size = card.querySelector(".size-btn.active");

      if(!size){
        alert("Select size first");
        return;
      }

      cart.push({
        name: product.name,
        price: product.price,
        image: product.image,
        size: size.textContent,
        qty: 1
      });

      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart 🛒");
    };
  });
}

renderProducts(products);
