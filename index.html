<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>KHEM WEAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: #f3f3f3;
  color: #111;
}

/* 🔥 PREMIUM HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 18px 60px;

  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-bottom: 1px solid #eee;
}

.logo {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 3px;
}

/* NAV */
.nav {
  display: flex;
  gap: 35px;
}

/* LINKS */
.nav a {
  position: relative;
  text-decoration: none;
  color: #111;
  font-size: 15px;
  font-weight: 500;
  padding-bottom: 5px;
}

/* UNDERLINE ANIMATION */
.nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;

  width: 0%;
  height: 2px;
  background: #111;

  transition: 0.3s;
}

.nav a:hover::after {
  width: 100%;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 80px 60px;
  background: #eee;
}

.hero-text h1 {
  font-size: 64px;
  font-weight: 800;
}

.hero-text p {
  margin: 20px 0;
  font-size: 14px;
  color: #555;
}

.hero-text button {
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: #111;
  color: #fff;
  cursor: pointer;
}

.hero-image img {
  max-height: 500px;
}

/* COLLECTION */
.collection {
  padding: 80px 60px;
  text-align: center;
  background: #ddd;
}

.collection h2 {
  font-size: 36px;
  letter-spacing: 2px;
}

.collection span {
  display: block;
  font-size: 14px;
  margin-top: 10px;
}

.collection-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.collection-grid img {
  width: 300px;
  height: 400px;
  object-fit: cover;
}

/* BESTSELLERS */
.bestsellers {
  padding: 80px 60px;
  background: #fff;
}

.products {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  margin-top: 40px;
}

.product {
  text-align: center;
}

.product img {
  width: 100%;
  background: #eee;
}

.product-link {
  text-decoration: none;
  color: inherit;
  display: block;
}

.product p {
  margin-top: 10px;
}

.product span {
  font-size: 14px;
  color: #666;
}

/* BUTTON */
.btn-outline {
  padding: 12px 25px;
  border: 1px solid #111;
  color: #111;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  transition: 0.3s;
}

.btn-outline:hover {
  background: #111;
  color: white;
}

/* 🔥 RESPONSIVE */
@media (max-width: 900px) {

  .header {
    flex-direction: column;
    align-items: flex-start;
    padding: 15px 20px;
  }

  .logo {
    font-size: 26px;
    margin-bottom: 10px;
  }

  .nav {
    width: 100%;
    justify-content: space-between;
    gap: 10px;
  }

  .nav a {
    font-size: 14px;
  }

  .hero {
    flex-direction: column;
    text-align: center;
    padding: 50px 20px;
  }

  .hero-text h1 {
    font-size: 42px;
  }

  .hero-image img {
    max-width: 100%;
    height: auto;
    margin-top: 20px;
  }

  .products {
    grid-template-columns: repeat(2, 1fr);
  }

  .collection-grid {
    flex-direction: column;
    align-items: center;
  }
}

</style>
</head>
