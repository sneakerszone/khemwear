<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHEM Catalog</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: #f5f5f5;
  color: #111;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: #fff;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.header nav a {
  margin-left: 30px;
  text-decoration: none;
  color: #111;
}

.header button {
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
}

/* TITLE */
.title {
  text-align: center;
  padding: 50px 20px 20px;
}

.title h1 {
  font-size: 40px;
}

/* PRODUCTS GRID */
.products {
  padding: 40px 60px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
}

.card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
  text-align: center;
}

.card-content h3 {
  margin-bottom: 5px;
}

.price {
  color: #777;
  font-size: 14px;
}

.buy-btn {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  background: #000;
  color: #fff;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .products {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<!-- LOGIN PROTECTION -->
<script>
const isLoggedIn = localStorage.getItem("isLoggedIn");

if (isLoggedIn !== "true") {
  alert("Please login first 🔒");
  window.location.href = "login.html";
}
</script>

<!-- HEADER -->
<header class="header">
  <div class="logo">KHEM</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="#">Catalog</a>
  </nav>

  <button onclick="logout()">Logout</button>
</header>

<!-- TITLE -->
<div class="title">
  <h1>CATALOG</h1>
</div>

<!-- PRODUCTS -->
<section class="products">

  <div class="card">
    <img src="https://i.pinimg.com/1200x/9e/a6/5d/9ea65d76c4ad94fe5aff1a743ff063da.jpg">
    <div class="card-content">
      <h3>T-Shirt</h3>
      <p class="price">200 GHS</p>
      <button class="buy-btn" onclick="buyNow('tsshirt.html')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://img.ltwebstatic.com/images3_pi/2024/08/16/c3/17237794098d0396cd1cbc949460ded2c9f264ce22_thumbnail_900x.webp">
    <div class="card-content">
      <h3>Shorts</h3>
      <p class="price">250 GHS</p>
      <button class="buy-btn" onclick="buyNow('shorts.html')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/1200x/c8/42/76/c842767eb0534753c4566e5fb955e798.jpg">
    <div class="card-content">
      <h3>Socks</h3>
      <p class="price">50 GHS</p>
      <button class="buy-btn" onclick="buyNow('socks.html')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://n.nordstrommedia.com/id/sr3/46bcac48-a83f-4b21-b626-ab3cca58a4b1.jpeg?h=365&w=240&dpr=2">
    <div class="card-content">
      <h3>Pants</h3>
      <p class="price">350 GHS</p>
      <button class="buy-btn" onclick="buyNow('jeans.html')">Buy Now</button>
    </div>
  </div>

</section>

<!-- SCRIPTS -->
<script>
function buyNow() {
  window.location.href = "checkout.html";
}

function logout() {
  localStorage.removeItem("isLoggedIn");
  window.location.href = "login.html";
}
function buyNow(page) {
  window.location.href = page;
}
</script>

</body>
</html>
